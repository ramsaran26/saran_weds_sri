  <div class="section countdown-strip" aria-label="Countdown to wedding">
    <div class="countdown-item">
      <div class="countdown-num" id="cd-days">{{days}}</div>
      <div class="countdown-label">Days</div>
    </div>
    <div class="countdown-sep">:</div>
    <div class="countdown-item">
      <div class="countdown-num" id="cd-hours">{{hours}}</div>
      <div class="countdown-label">Hours</div>
    </div>
    <div class="countdown-sep">:</div>
    <div class="countdown-item">
      <div class="countdown-num" id="cd-mins">{{mins}}</div>
      <div class="countdown-label">Minutes</div>
    </div>
    <div class="countdown-sep">:</div>
    <div class="countdown-item">
      <div class="countdown-num" id="cd-secs">{{secs}}</div>
      <div class="countdown-label">Seconds</div>
    </div>
  </div>
